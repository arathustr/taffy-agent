<!doctype html><meta charset="utf-8"><title>listening sprite preview</title><style>body{margin:0;background:#101719;color:#eef4f1;font-family:system-ui,"Microsoft YaHei";display:grid;place-items:center;min-height:100vh}.wrap{display:grid;gap:16px;place-items:center}.stage{width:384px;height:384px;display:grid;place-items:center;background-image:linear-gradient(45deg,#1f3034 25%,transparent 25% 75%,#1f3034 75%),linear-gradient(45deg,#1f3034 25%,transparent 25% 75%,#1f3034 75%);background-position:0 0,12px 12px;background-size:24px 24px;border:1px solid #284044;border-radius:16px}img{width:320px;height:320px;image-rendering:pixelated;object-fit:contain}h1{font-size:18px;margin:0;color:#dff5ee}.sheet{width:min(92vw,900px);height:auto;image-rendering:pixelated;background:#172326;border-radius:8px}</style><div class="wrap"><h1>listening</h1><div class="stage"><img id="sprite" src="frames/frame-000.png"></div><img class="sheet" src="listening-sheet-transparent.png"></div><script>let i=0;setInterval(()=>{i=(i+1)%8;document.getElementById('sprite').src='frames/frame-'+String(i).padStart(3,'0')+'.png';},120)</script>
